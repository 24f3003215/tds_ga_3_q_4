name: Daily Repository Update

on:
  schedule:
    - cron: '30 2 * * *'   # Runs every day at 02:30 UTC (specific time)
  workflow_dispatch:       # Allows manual trigger

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "DevSync Bot"
          git config user.email "24f3003215@ds.study.iitm.ac.in"

      - name: Update file - 24f3003215@ds.study.iitm.ac.in
        run: |
          echo "Last update: $(date -u)" >> daily-log.txt

      - name: Commit and Push
        run: |
          git add daily-log.txt
          git commit -m "Automated daily update - $(date -u)" || echo "No changes to commit"
          git push
